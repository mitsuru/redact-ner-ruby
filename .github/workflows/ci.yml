name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Ruby ${{ matrix.ruby }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        ruby: ["3.2", "3.3", "3.4"]
        include:
          # Ruby 4.0 is not generally available yet; mark as experimental
          # so the matrix stays green while we track upcoming releases.
          - os: ubuntu-latest
            ruby: "4.0"
            experimental: true
    steps:
      - uses: actions/checkout@v4

      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          rustup-toolchain: stable
          bundler-cache: true
          cargo-cache: true
          cache-version: v1

      - name: Compile native extension
        run: bundle exec rake compile

      - name: Run tests
        run: bundle exec rake test
